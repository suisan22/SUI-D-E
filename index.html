 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUI ELIMINATE // AI SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-slate-800 pb-6">
            <h1 class="text-3xl font-bold text-blue-500">SUI ELIMINATE // AI SCANNER</h1>
            <p class="text-slate-400">Real-time AI-powered threat detection intelligence</p>
        </header>

        <div class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800 mb-8">
    <div class="flex gap-4">
        <input type="text" id="urlInput" placeholder="Enter URL to analyze..." 
            class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
        <button id="scanButton" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-lg font-bold transition shadow-lg shadow-blue-900/20">
            INITIATE SCAN
        </button>
    </div>
</div>

        <div class="bg-slate-900 rounded-xl shadow-xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-950 text-slate-400 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="px-6 py-4">URL</th>
                        <th class="px-6 py-4">Security Status</th>
                    </tr>
                </thead>
                <tbody id="threatBody" class="divide-y divide-slate-800">
                    <tr>
                        <td colspan="2" class="px-6 py-8 text-center text-slate-500 italic">Enter a URL above to start scanning...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="bg-slate-900 p-6 rounded-xl shadow-xl border border-slate-800 mt-8">
    <h2 class="text-xl font-bold text-purple-500 mb-4">IMAGE FORENSICS // WEB DETECTION</h2>
    <div class="flex gap-4">
        <input type="file" id="imageInput" class="text-slate-400">
        <button id="analyzeButton" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded-lg font-bold">
            ANALYZE IMAGE
        </button>
    </div>
    <div id="imageResults" class="mt-4 text-slate-300 space-y-2"></div>
</div>
<script type="module" src="script.js"></script>
    <script>
        async function scanUrl() {
            const url = document.getElementById('urlInput').value;
            const body = document.getElementById('threatBody');
            if (!url) return alert("Please enter a URL!");

            body.innerHTML = '<tr><td colspan="2" class="px-6 py-8 text-center text-blue-400 animate-pulse">AI is analyzing content... please wait.</td></tr>';

            try {
                const response = await fetch('http://127.0.0.1:8000/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                // FIXED: Receive the data object directly
                const result = await response.json();
                
                // FIXED: Used 'result' directly (no .result, no .replace)
                body.innerHTML = `
                    <tr class="${result.isIllegal ? 'bg-red-950/20' : 'bg-green-950/20'}">
                        <td class="px-6 py-4">${url}</td>
                        <td class="px-6 py-4 font-bold ${result.isIllegal ? 'text-red-500' : 'text-green-500'}">
                            ${result.isIllegal ? '⚠️ ILLEGAL CONTENT' : '✅ SAFE'}
                        </td>
                    </tr>
                    <tr class="bg-slate-950">
                        <td colspan="2" class="px-6 py-2 text-sm text-slate-400">
                            <strong>Reason:</strong> ${result.reason}
                        </td>
                    </tr>
                `;
            } catch (error) {
                console.error("Fetch Error:", error);
                body.innerHTML = '<tr><td colspan="2" class="px-6 py-8 text-center text-red-500">Error: Could not connect to the AI Backend.</td></tr>';
            }
        }
    </script>
</body>
</html>
